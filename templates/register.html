<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbidjanWaste — Inscription</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo h2 { color: #2e7d32; font-size: 24px; margin-bottom: 6px; }
        .auth-logo p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #444; }
        .form-control {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            transition: border-color 0.2s;
        }
        .form-control:focus { outline: none; border-color: #2e7d32; background: white; }
        .btn-submit {
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:hover { background: #1b5e20; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .auth-footer a { color: #2e7d32; text-decoration: none; font-weight: 600; }
        .error-msg { background: #ffebee; color: #c62828; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .success-msg { background: #e8f5e9; color: #2e7d32; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div>
            <h1>🗑️ AbidjanWaste</h1>
            <p>Gestion intelligente des déchets</p>
        </div>
    </a>
    <div class="navbar-nav">
        <a href="/">🏠 Accueil</a>
        <a href="/carte/">🗺️ Carte</a>
        <a href="/login/">🔐 Connexion</a>
        <a href="/register/" class="active">📝 Inscription</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div style="font-size:48px;margin-bottom:10px">👤</div>
            <h2>Créer un compte</h2>
            <p>Rejoignez la communauté AbidjanWaste</p>
        </div>

        <div id="error-msg" class="error-msg" style="display:none"></div>
        <div id="success-msg" class="success-msg" style="display:none"></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Prénom</label>
                <input type="text" id="first_name" class="form-control" placeholder="Prénom">
            </div>
            <div class="form-group">
                <label class="form-label">Nom</label>
                <input type="text" id="last_name" class="form-control" placeholder="Nom">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" id="username" class="form-control" placeholder="Choisissez un nom d'utilisateur">
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="votre@email.com">
        </div>

        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-control" placeholder="Minimum 8 caractères">
        </div>

        <div class="form-group">
            <label class="form-label">Confirmer le mot de passe</label>
            <input type="password" id="password2" class="form-control" placeholder="Répétez le mot de passe">
        </div>

        <button class="btn-submit" onclick="sInscrire()">📝 Créer mon compte</button>

        <div class="auth-footer">
            Déjà un compte ? <a href="/login/">Se connecter</a>
        </div>
    </div>
</div>

<script>
function sInscrire() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const first_name = document.getElementById('first_name').value;
    const last_name = document.getElementById('last_name').value;

    if (!username || !email || !password) {
        afficherErreur('Veuillez remplir tous les champs obligatoires.');
        return;
    }
    if (password !== password2) {
        afficherErreur('Les mots de passe ne correspondent pas.');
        return;
    }
    if (password.length < 8) {
        afficherErreur('Le mot de passe doit contenir au moins 8 caractères.');
        return;
    }

    fetch('/api/auth/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, first_name, last_name })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            document.getElementById('success-msg').textContent = '✅ Compte créé ! Redirection...';
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => window.location.href = '/', 2000);
        } else {
            afficherErreur(data.error || 'Erreur lors de la création du compte.');
        }
    })
    .catch(() => afficherErreur('Erreur de connexion.'));
}

function afficherErreur(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}
</script>

</body>
</html>
